<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>User Management</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;padding:20px}h1{font-size:20px;margin-bottom:16px}button{font-family:inherit;cursor:pointer;border:none}table{width:100%;border-collapse:collapse}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #1f1f23;font-size:13px}th{color:#71717a;font-weight:600}td{color:#d4d4d8}.btn{padding:6px 12px;border-radius:8px;font-size:12px}.btn-primary{background:#4f46e5;color:#fff}.btn-outline{background:transparent;border:1px solid #27272a;color:#d4d4d8}.btn-danger{background:#dc2626;color:#fff;padding:4px 10px;font-size:11px}.btn-sm{font-size:11px;padding:4px 10px}.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:16px}.modal-overlay.open{display:flex}.modal{width:100%;max-width:440px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px;max-height:90vh;overflow-y:auto}.modal h2{font-size:16px;margin-bottom:12px}.modal label{display:block;font-size:12px;color:#71717a;margin-bottom:4px}.modal input,.modal select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #27272a;background:#09090b;color:#f4f4f5;font-size:14px;margin-bottom:10px}.modal .row{display:flex;gap:8px}.modal .row>*{flex:1}.modal .btns{display:flex;gap:8px;margin-top:12px}.modal .btns button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600}.modal .checks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.modal .checks label{font-size:12px;color:#d4d4d8;display:flex;align-items:center;gap:4px;margin:0}select,input.text{padding:6px 10px;border-radius:8px;border:1px solid #27272a;background:#18181b;color:#d4d4d8;font-size:12px}a{color:#a5b4fc}</style></head><body>
<h1>👥 User Management</h1>
<div class="toolbar"><button class="btn btn-outline btn-sm" onclick="history.back()">← Dashboard</button><button class="btn btn-primary" onclick="openForm()">+ Add User</button><select id="filterRole"><option value="">All Roles</option><option value="attendee">Attendee</option><option value="user">User</option><option value="registered_user">Registered</option><option value="vip">VIP</option><option value="super_user">Super User</option><option value="vendor">Vendor</option><option value="sponsor">Sponsor</option></select><input type="text" id="filterSearch" placeholder="Search..." class="text" /><span id="userCount" style="font-size:12px;color:#71717a"></span></div>
<table><thead><tr><th>Username</th><th>Role</th><th>Car</th><th>Location</th><th>Sharing</th><th>Offerings</th><th>Actions</th></tr></thead><tbody id="userTable"></tbody></table>
<div class="modal-overlay" id="modal"><div class="modal">
<h2 id="modalTitle">Add User</h2>
<label>Username</label><input type="text" id="fUsername" placeholder="e.g. bmwfanatic" />
<div class="row"><div><label>Display</label><input type="text" id="fDisplay" /></div><div><label>Role</label><select id="fRole"><option value="attendee">Attendee</option><option value="user">User</option><option value="registered_user">Registered</option><option value="vip">VIP</option><option value="super_user">Super User</option><option value="vendor">Vendor</option><option value="sponsor">Sponsor</option></select></div></div>
<label>Car</label><input type="text" id="fCar" placeholder="e.g. 2020 BMW M3" />
<label>Profile Photo URL</label><input type="text" id="fPhoto" placeholder="https://..." />
<label>Instagram</label><input type="text" id="fInsta" placeholder="@username" />
<label>Email</label><input type="email" id="fEmail" placeholder="user@example.com" />
<label>Blurb</label><input type="text" id="fBlurb" placeholder="Short description" />
<div class="row"><div><label>Lat</label><input type="number" id="fLat" step="any" value="40.5144" /></div><div><label>Lng</label><input type="number" id="fLng" step="any" value="-111.4764" /></div></div>
<div style="margin-bottom:10px"><label>Click map to set location</label><div id="pickMap" style="width:100%;height:140px;border-radius:10px;border:1px solid #27272a"></div></div>
<label>Offerings</label><div class="checks"><label><input type="checkbox" class="fOffer" value="swag" /> Swag</label><label><input type="checkbox" class="fOffer" value="giveaway" /> Giveaway</label><label><input type="checkbox" class="fOffer" value="merch" /> Merch</label><label><input type="checkbox" class="fOffer" value="poker" /> Poker</label><label><input type="checkbox" class="fOffer" value="photo" /> Photo</label></div>
<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="fLocOn" checked /> Location sharing ON</label>
<div class="btns"><button class="btn btn-outline" onclick="closeForm()">Cancel</button><button class="btn btn-primary" onclick="saveUser()">Save</button></div>
</div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var editingUser=null, pickMap, pickMarker;
function initMapPicker(lat,lng){
  var el=document.getElementById('pickMap');if(!el)return;
  if(pickMap)pickMap.remove();
  pickMap=L.map(el,{zoomControl:false,attributionControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(pickMap);
  pickMarker=L.marker([lat,lng],{draggable:true}).addTo(pickMap);
  pickMarker.on('dragend',function(){var p=pickMarker.getLatLng();document.getElementById('fLat').value=p.lat.toFixed(6);document.getElementById('fLng').value=p.lng.toFixed(6)});
  pickMap.on('click',function(e){pickMarker.setLatLng(e.latlng);document.getElementById('fLat').value=e.latlng.lat.toFixed(6);document.getElementById('fLng').value=e.latlng.lng.toFixed(6)});
}
function loadUsers(){
  fetch('/api/dummy-users').then(function(r){return r.json()}).then(function(list){
    var q=(document.getElementById('filterSearch').value||'').toLowerCase();
    var r=document.getElementById('filterRole').value;
    var rows='',count=0;
    for(var i=0;i<list.length;i++){
      var u=list[i];
      if(r&&u.role!==r)continue;
      if(q&&!(u.username.toLowerCase().indexOf(q)>=0||(u.car||'').toLowerCase().indexOf(q)>=0))continue;
      count++;rows+='<tr><td>'+esc(u.username)+'</td><td>'+esc(u.role)+'</td><td>'+(u.car||'-')+'</td><td>'+u.lat.toFixed(4)+','+u.lng.toFixed(4)+'</td>';
      rows+='<td><button class="btn btn-sm '+(u.locationEnabled!==false?'btn-primary':'btn-outline')+'" onclick="toggleLoc(\''+u.username+'\','+(u.locationEnabled!==false)+')">'+(u.locationEnabled!==false?'📍 On':'Off')+'</button></td>';
      rows+='<td>'+(u.offering||'-')+'</td>';
      rows+='<td><button class="btn btn-outline btn-sm" onclick="editUser(\''+u.username+'\')">Edit</button> <button class="btn-danger btn-sm" onclick="delUser(\''+u.username+'\')">Del</button></td></tr>';
    }
    document.getElementById('userCount').textContent=count+' users';
    document.getElementById('userTable').innerHTML=rows||'<tr><td colspan="7" style="color:#71717a;text-align:center">No users</td></tr>';
  });
}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function clr(id){document.getElementById(id).value=''}
function setf(id,v){document.getElementById(id).value=v||''}
function openForm(){editingUser=null;document.getElementById('modalTitle').textContent='Add User';document.getElementById('fUsername').disabled=false;clr('fUsername');clr('fDisplay');document.getElementById('fRole').value='attendee';clr('fCar');clr('fPhoto');clr('fInsta');clr('fEmail');clr('fBlurb');document.getElementById('fLat').value=40.5144;document.getElementById('fLng').value=-111.4764;document.getElementById('fLocOn').checked=true;document.querySelectorAll('.fOffer').forEach(function(c){c.checked=false});document.getElementById('modal').classList.add('open');initMapPicker(40.5144,-111.4764)}
function editUser(username){fetch('/api/dummy-users').then(function(r){return r.json()}).then(function(list){for(var i=0;i<list.length;i++){if(list[i].username===username){var u=list[i];editingUser=u.username;document.getElementById('modalTitle').textContent='Edit User';document.getElementById('fUsername').value=u.username;document.getElementById('fUsername').disabled=true;setf('fDisplay',u.display);document.getElementById('fRole').value=u.role;setf('fCar',u.car);setf('fPhoto',u.photo);setf('fInsta',u.instagram);setf('fEmail',u.email);setf('fBlurb',u.blurb);document.getElementById('fLat').value=u.lat;document.getElementById('fLng').value=u.lng;document.getElementById('fLocOn').checked=u.locationEnabled!==false;document.querySelectorAll('.fOffer').forEach(function(c){c.checked=(u.offering||'').split(',').indexOf(c.value)>=0});document.getElementById('modal').classList.add('open');initMapPicker(u.lat,u.lng);return}}})}
function closeForm(){document.getElementById('modal').classList.remove('open')}
function saveUser(){var offers=[];document.querySelectorAll('.fOffer:checked').forEach(function(c){offers.push(c.value)});var un=document.getElementById('fUsername').value.trim();var data={username:un,display:document.getElementById('fDisplay').value.trim(),role:document.getElementById('fRole').value,car:document.getElementById('fCar').value.trim(),photo:document.getElementById('fPhoto').value.trim(),instagram:document.getElementById('fInsta').value.trim(),email:document.getElementById('fEmail').value.trim(),blurb:document.getElementById('fBlurb').value.trim(),lat:parseFloat(document.getElementById('fLat').value)||40.5144,lng:parseFloat(document.getElementById('fLng').value)||-111.4764,event_id:'demo-event-1',offering:offers.join(','),locationEnabled:document.getElementById('fLocOn').checked};if(!un){alert('Username required');return}var m=editingUser?'PUT':'POST';var url=editingUser?'/api/dummy-users/'+editingUser:'/api/dummy-users';fetch(url,{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){if(!r.ok){alert('Server error: '+r.status);return}closeForm();loadUsers()}).catch(function(e){alert('Save failed: '+e.message)})}
function delUser(username){if(confirm('Delete '+username+'?')){fetch('/api/dummy-users/'+username,{method:'DELETE'}).then(function(){loadUsers()})}}
function toggleLoc(username,on){fetch('/api/dummy-users/'+username,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({locationEnabled:!on})}).then(function(){loadUsers()})}
document.getElementById('filterRole').addEventListener('change',loadUsers);
document.getElementById('filterSearch').addEventListener('input',loadUsers);
window.addEventListener('load',loadUsers);
</script></body></html>
