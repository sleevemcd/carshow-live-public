<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>User Management</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;padding:20px}h1{font-size:20px;margin-bottom:16px}button{cursor:pointer;border:none;font-family:inherit}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #1f1f23;font-size:13px}th{color:#71717a;font-weight:600}td{color:#d4d4d8}.btn{padding:6px 12px;border-radius:8px;font-size:12px}.btn-primary{background:#4f46e5;color:#fff}.btn-outline{background:transparent;border:1px solid #27272a;color:#d4d4d8}.btn-danger{background:#dc2626;color:#fff;padding:4px 10px;font-size:11px}.btn-sm{font-size:11px;padding:4px 10px}.toolbar{display:flex;gap:8px;margin-bottom:16px}.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:16px}.modal-overlay.open{display:flex}.modal{width:100%;max-width:420px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px}.modal h2{font-size:16px;margin-bottom:12px}.modal label{display:block;font-size:12px;color:#71717a;margin-bottom:4px}.modal input,.modal select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #27272a;background:#09090b;color:#f4f4f5;font-size:14px;margin-bottom:10px}.modal .row{display:flex;gap:8px}.modal .row>*{flex:1}.modal .btns{display:flex;gap:8px;margin-top:12px}.modal .btns button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600}.modal .checks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.modal .checks label{font-size:12px;color:#d4d4d8;display:flex;align-items:center;gap:4px;margin:0}a{color:#a5b4fc}</style></head><body>
<h1>👥 User Management</h1><div class="toolbar"><button class="btn btn-primary" onclick="openForm()">+ Add User</button><button class="btn btn-outline btn-sm" onclick="location.href='/'">← Dashboard</button></div>
<table><thead><tr><th>Username</th><th>Role</th><th>Car</th><th>Location</th><th>Sharing</th><th>Offerings</th><th>Actions</th></tr></thead><tbody id="userTable"></tbody></table>
<div class="modal-overlay" id="modal"><div class="modal">
<h2 id="modalTitle">Add User</h2>
<label>Username</label><input type="text" id="fUsername" placeholder="e.g. bmwfanatic" />
<div class="row"><div><label>Display</label><input type="text" id="fDisplay" /></div><div><label>Role</label><select id="fRole"><option value="attendee">Attendee</option><option value="user">User</option><option value="registered_user">Registered</option><option value="vip">VIP</option><option value="super_user">Super User</option><option value="vendor">Vendor</option><option value="sponsor">Sponsor</option></select></div></div>
<label>Car</label><input type="text" id="fCar" placeholder="e.g. 2020 BMW M3" />
<label>Instagram</label><input type="text" id="fInsta" placeholder="@username" />
<label>Email</label><input type="email" id="fEmail" placeholder="user@example.com" />
<label>Blurb</label><input type="text" id="fBlurb" placeholder="Short description" />
<div class="row"><div><label>Lat</label><input type="number" id="fLat" step="any" value="40.5144" /></div><div><label>Lng</label><input type="number" id="fLng" step="any" value="-111.4764" /></div></div>
<label>Offerings</label><div class="checks"><label><input type="checkbox" class="fOffer" value="swag" /> Swag</label><label><input type="checkbox" class="fOffer" value="giveaway" /> Giveaway</label><label><input type="checkbox" class="fOffer" value="merch" /> Merch</label><label><input type="checkbox" class="fOffer" value="poker" /> Poker</label><label><input type="checkbox" class="fOffer" value="photo" /> Photo</label></div>
<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="fLocOn" checked /> Location sharing ON</label>
<div class="btns"><button class="btn btn-outline" onclick="closeForm()">Cancel</button><button class="btn btn-primary" onclick="saveUser()">Save</button></div>
</div></div>
<script>
var editingUser=null;
function loadUsers(){fetch('/api/dummy-users').then(function(r){return r.json()}).then(function(list){var rows='';for(var i=0;i<list.length;i++){var u=list[i];rows+='<tr><td>'+esc(u.username)+'</td><td>'+esc(u.role)+'</td><td>'+(u.car||'-')+'</td><td>'+u.lat.toFixed(4)+','+u.lng.toFixed(4)+'</td><td><button class="btn btn-sm '+(u.locationEnabled!==false?'btn-primary':'btn-outline')+'" onclick="toggleLoc(\''+u.username+'\','+(u.locationEnabled!==false)+')">'+(u.locationEnabled!==false?'📍 On':'Off')+'</button></td><td>'+(u.offering||'-')+'</td><td><button class="btn btn-outline btn-sm" onclick="editUser(\''+u.username+'\')">Edit</button> <button class="btn-danger btn-sm" onclick="delUser(\''+u.username+'\')">Del</button></td></tr>'}document.getElementById('userTable').innerHTML=rows||'<tr><td colspan="7" style="color:#71717a;text-align:center">No users</td></tr>'})}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function openForm(){editingUser=null;document.getElementById('modalTitle').textContent='Add User';document.getElementById('fUsername').value='';document.getElementById('fUsername').disabled=false;document.getElementById('fDisplay').value='';document.getElementById('fRole').value='attendee';document.getElementById('fCar').value='';document.getElementById('fInsta').value='';document.getElementById('fEmail').value='';document.getElementById('fBlurb').value='';document.getElementById('fLat').value=40.5144;document.getElementById('fLng').value=-111.4764;document.getElementById('fLocOn').checked=true;document.querySelectorAll('.fOffer').forEach(function(c){c.checked=false});document.getElementById('modal').classList.add('open')}
function editUser(username){fetch('/api/dummy-users').then(function(r){return r.json()}).then(function(list){for(var i=0;i<list.length;i++){if(list[i].username===username){var u=list[i];editingUser=u.username;document.getElementById('modalTitle').textContent='Edit User';document.getElementById('fUsername').value=u.username;document.getElementById('fUsername').disabled=true;document.getElementById('fDisplay').value=u.display||'';document.getElementById('fRole').value=u.role;document.getElementById('fCar').value=u.car||'';document.getElementById('fInsta').value=u.instagram||'';document.getElementById('fEmail').value=u.email||'';document.getElementById('fBlurb').value=u.blurb||'';document.getElementById('fLat').value=u.lat;document.getElementById('fLng').value=u.lng;document.getElementById('fLocOn').checked=u.locationEnabled!==false;document.querySelectorAll('.fOffer').forEach(function(c){c.checked=(u.offering||'').split(',').indexOf(c.value)>=0});document.getElementById('modal').classList.add('open');return}}})}
function closeForm(){document.getElementById('modal').classList.remove('open')}
function saveUser(){var offers=[];document.querySelectorAll('.fOffer:checked').forEach(function(c){offers.push(c.value)});var un=document.getElementById('fUsername').value.trim();var data={username:un,display:document.getElementById('fDisplay').value.trim(),role:document.getElementById('fRole').value,car:document.getElementById('fCar').value.trim(),instagram:document.getElementById('fInsta').value.trim(),email:document.getElementById('fEmail').value.trim(),blurb:document.getElementById('fBlurb').value.trim(),lat:parseFloat(document.getElementById('fLat').value)||40.5144,lng:parseFloat(document.getElementById('fLng').value)||-111.4764,event_id:'demo-event-1',offering:offers.join(','),locationEnabled:document.getElementById('fLocOn').checked};if(!un){alert('Username required');return}var m=editingUser?'PUT':'POST';var url=editingUser?'/api/dummy-users/'+editingUser:'/api/dummy-users';fetch(url,{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){if(!r.ok){alert('Server error: '+r.status);return}r.json()}).then(function(){closeForm();loadUsers()}).catch(function(e){alert('Save failed: '+e.message)})}
function delUser(username){if(confirm('Delete '+username+'?')){fetch('/api/dummy-users/'+username,{method:'DELETE'}).then(function(){loadUsers()})}}
function toggleLoc(username,currentlyOn){fetch('/api/dummy-users/'+username,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({locationEnabled:!currentlyOn})}).then(function(){loadUsers()})}
window.addEventListener('load',loadUsers);
</script></body></html>
