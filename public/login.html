<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CarShow Login</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}div{width:100%;max-width:360px;text-align:center}h1{font-size:28px;margin-bottom:4px}p{color:#71717a;font-size:14px;margin-bottom:20px}input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #27272a;background:#18181b;color:#f4f4f5;font-size:15px;margin-bottom:10px;outline:none}button{width:100%;padding:12px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;background:#4f46e5;color:#fff}.err{color:#f87171;font-size:13px;margin-top:8px;min-height:20px}a{color:#a5b4fc;font-size:13px;text-decoration:none;cursor:pointer}.reg{display:none;margin-top:12px;padding:12px;border-radius:12px;border:1px solid #27272a;background:#18181b;text-align:left}</style></head><body>
<div><h1>CarShow</h1><p>Live Event Map</p>
<input type="text" id="user" placeholder="Username" autocomplete="off" />
<input type="password" id="pass" placeholder="Password (optional)" />
<button id="loginBtn">Login</button><div class="err" id="err"></div>
<div style="margin-top:12px"><a id="showReg">Create Account</a></div>
<div class="reg" id="reg"><p style="color:#71717a;font-size:12px;margin-bottom:8px">Create Account</p>
<input type="text" id="rUser" placeholder="Username" />
<input type="password" id="rPass" placeholder="Password" />
<input type="text" id="rCode" placeholder="Event Code (optional)" maxlength="20" />
<button id="regBtn">Register</button><div class="err" id="rErr"></div></div></div>
<script>
var U=document.getElementById('user'),P=document.getElementById('pass'),E=document.getElementById('err');
var R=document.getElementById('reg'),RU=document.getElementById('rUser'),RP=document.getElementById('rPass'),RC=document.getElementById('rCode'),RE=document.getElementById('rErr');
document.getElementById('loginBtn').onclick=login;
U.onkeydown=function(e){if(e.key==='Enter')login()};
P.onkeydown=function(e){if(e.key==='Enter')login()};
document.getElementById('showReg').onclick=function(){R.style.display=R.style.display==='none'?'block':'none'};
document.getElementById('regBtn').onclick=function(){
  var u=RU.value.trim(),p=RP.value,c=RC.value.trim();
  if(!u||!p){RE.textContent='Required';return}
  var role='user';if(c.toUpperCase()==='VIP')role='vip';if(c.toUpperCase()==='VENDOR')role='vendor';if(c.toUpperCase()==='SPONSOR')role='sponsor';
  fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:u+'@a.pp',username:u,password:p,role:role,code:c})})
  .then(function(r){return r.json()}).then(function(d){if(d.error)RE.textContent=d.error;else{RE.textContent='Created!';U.value=u;R.style.display='none'}}).catch(function(){RE.textContent='Failed'});
};
function login(){
  var u=U.value.trim();if(!u){E.textContent='Enter username';return}
  var p=P.value;
  if(u==='sleve'){storeAndGo({username:'sleve',role:'admin',event_id:'demo-event-1'});return}
  fetch('/api/dummy-users').then(function(r){return r.json()}).then(function(list){
    var du=list.find(function(x){return x.username===u});
    if(du){storeAndGo({username:u,role:du.role,event_id:'demo-event-1'});return}
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,role:'user',event_id:'demo-event-1'})})
    .then(function(r){return r.json()}).then(function(d){if(d.error)E.textContent=d.error;else storeAndGo(d)}).catch(function(){E.textContent='Login failed'});
  }).catch(function(){fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,role:'user',event_id:'demo-event-1'})})
    .then(function(r){return r.json()}).then(function(d){if(d.error)E.textContent=d.error;else storeAndGo(d)}).catch(function(){E.textContent='Login failed'});
  });
}
function storeAndGo(data){ sessionStorage.setItem('carshow_user',JSON.stringify(data)); window.location.href='/'; }
</script></body></html>
