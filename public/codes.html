<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Access Codes</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;padding:20px;max-width:500px;margin:0 auto}h1{font-size:20px;margin-bottom:16px}button{font-family:inherit;cursor:pointer;border:none}.btn{padding:6px 12px;border-radius:8px;font-size:12px}.btn-primary{background:#4f46e5;color:#fff}.btn-outline{background:transparent;border:1px solid #27272a;color:#d4d4d8}.btn-danger{background:#dc2626;color:#fff;padding:4px 10px;font-size:11px}.toolbar{display:flex;gap:8px;margin-bottom:16px}input,select{padding:8px 12px;border-radius:8px;border:1px solid #27272a;background:#18181b;color:#d4d4d8;font-size:13px;outline:none}select{flex:1}.card{padding:10px 14px;border-bottom:1px solid #1f1f23;display:flex;justify-content:space-between;align-items:center;font-size:13px}code{color:#a5b4fc}a{color:#a5b4fc}</style></head><body>
<h1>🔑 Access Codes</h1>
<div class="toolbar"><button class="btn btn-outline" onclick="history.back()">← Back</button><a href="/"><button class="btn btn-outline btn-sm">Dashboard</button></a></div>
<div style="display:flex;gap:8px;margin-bottom:16px"><input type="text" id="newCode" placeholder="Code (e.g. WEF2026)" style="flex:1" maxlength="20" /><select id="newCodeRole"><option value="user">User</option><option value="registered_user">Registered</option><option value="vip">VIP</option><option value="vendor">Vendor</option><option value="sponsor">Sponsor</option><option value="organizer">Organizer</option></select><button class="btn btn-primary" onclick="addCode()">Add</button></div>
<div id="list"></div>
<script>
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function load(){fetch('/api/access-codes').then(function(r){return r.json()}).then(function(codes){var keys=Object.keys(codes);var h='';for(var i=0;i<keys.length;i++){var k=keys[i];h+='<div class="card"><span><code>'+esc(k)+'</code> → '+esc(codes[k].role)+'</span><button class="btn-danger" onclick="del(\''+k+'\')">Del</button></div>'};document.getElementById('list').innerHTML=h||'<p style="color:#52525b;text-align:center;padding:20px">No codes</p>'})}
function addCode(){var c=document.getElementById('newCode').value.trim().toUpperCase();var r=document.getElementById('newCodeRole').value;if(!c)return;fetch('/api/access-codes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:c,role:r})}).then(function(){document.getElementById('newCode').value='';load()})}
function del(c){fetch('/api/access-codes/'+c,{method:'DELETE'}).then(function(){load()})}
window.addEventListener('load',load);
</script></body></html>
