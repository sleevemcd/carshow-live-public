<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>GPX Route Management</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;padding:20px}h1{font-size:20px;margin-bottom:16px}button{font-family:inherit;cursor:pointer;border:none}.btn{padding:6px 12px;border-radius:8px;font-size:12px}.btn-primary{background:#4f46e5;color:#fff}.btn-outline{background:transparent;border:1px solid #27272a;color:#d4d4d8}.btn-danger{background:#dc2626;color:#fff;padding:4px 10px;font-size:11px}.btn-sm{font-size:11px;padding:4px 10px}.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #27272a;background:#18181b;color:#d4d4d8;font-size:13px;margin-bottom:10px;outline:none;font-family:inherit}textarea{resize:vertical;min-height:60px}.card{padding:14px;border:1px solid #27272a;border-radius:12px;margin-bottom:10px;background:#18181b}.card h3{font-size:15px;margin-bottom:4px}.card p{font-size:12px;color:#71717a}.card .actions{margin-top:8px;display:flex;gap:6px}.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:16px}.modal-overlay.open{display:flex}.modal{width:100%;max-width:440px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px}.modal h2{font-size:16px;margin-bottom:12px}.modal .btns{display:flex;gap:8px;margin-top:12px}.modal .btns button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600}</style></head><body>
<h1>🏔 GPX Routes</h1>
<div class="toolbar"><button class="btn btn-outline btn-sm" onclick="history.back()">← Dashboard</button><button class="btn btn-primary" onclick="openForm()">+ Import Route</button><button class="btn btn-outline btn-sm" onclick="loadLeaderboard()">🏆 Leaderboard</button><span id="count" style="font-size:12px;color:#71717a"></span></div>
<div id="list"></div>
<div id="leaderboard" style="display:none;margin-top:16px"></div>
<div class="modal-overlay" id="modal"><div class="modal">
<h2 id="modalTitle">Import Route</h2>
<label style="font-size:12px;color:#71717a;display:block;margin-bottom:4px">Route Name</label><input type="text" id="fName" placeholder="e.g. Alpine Loop Cruise" />
<label style="font-size:12px;color:#71717a;display:block;margin-bottom:4px">Description</label><textarea id="fDesc" placeholder="Route details..."></textarea>
<label style="font-size:12px;color:#71717a;display:block;margin-bottom:4px">Upload GPX File</label><input type="file" id="fFile" accept=".gpx" style="margin-bottom:10px;padding:8px;border:1px solid #27272a;border-radius:8px;background:#18181b;color:#d4d4d8;font-size:12px;width:100%" />
<label style="font-size:12px;color:#71717a;display:block;margin-bottom:4px">OR paste coordinates (lat,lng per line)</label><textarea id="fPoints" placeholder="40.5144,-111.4764&#10;40.5210,-111.4950" rows="4" style="font-family:monospace;font-size:12px"></textarea>
<div class="btns"><button class="btn btn-outline" onclick="closeForm()">Cancel</button><button class="btn btn-primary" onclick="saveRoute()">Save Route</button></div>
</div></div>
<script>
function load(){
  fetch('/api/gpx').then(function(r){return r.json()}).then(function(list){
    document.getElementById('count').textContent=list.length+' routes';
    var h='';
    for(var i=0;i<list.length;i++){
      var t=list[i];var dist=calcDist(t.points);
      h+='<div class="card"><h3>'+esc(t.name)+'</h3><p>'+esc(t.description||'')+'</p><p style="font-size:11px;color:#52525b;margin-top:4px">'+t.points.length+' points · ~'+dist.toFixed(1)+' km</p><div class="actions"><button class="btn-danger btn-sm" onclick="del(\''+t.id+'\')">Delete</button></div></div>';
    }
    document.getElementById('list').innerHTML=h||'<p style="color:#52525b;text-align:center;padding:40px">No routes</p>';
  });
}
function calcDist(pts){var d=0;for(var i=1;i<pts.length;i++){var dx=(pts[i][1]-pts[i-1][1])*111320*Math.cos(pts[i][0]*0.01745);var dy=(pts[i][0]-pts[i-1][0])*110540;d+=Math.sqrt(dx*dx+dy*dy)}return d/1000}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function openForm(){document.getElementById('modalTitle').textContent='Import Route';document.getElementById('fName').value='';document.getElementById('fDesc').value='';document.getElementById('fPoints').value='';document.getElementById('modal').classList.add('open')}
function closeForm(){document.getElementById('modal').classList.remove('open')}
function saveRoute(){
  var name=document.getElementById('fName').value.trim();if(!name)return;
  var desc=document.getElementById('fDesc').value.trim();
  var file=document.getElementById('fFile').files[0];
  if(file){
    var reader=new FileReader();
    reader.onload=function(e){
      fetch('/api/gpx/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,description:desc,gpxData:e.target.result})})
      .then(function(r){return r.json()}).then(function(){closeForm();load()});
    };
    reader.readAsText(file);
    return;
  }
  var raw=document.getElementById('fPoints').value.trim().split('\n');
  var points=[];
  for(var i=0;i<raw.length;i++){var p=raw[i].trim().split(',');if(p.length===2){var lat=parseFloat(p[0]),lng=parseFloat(p[1]);if(!isNaN(lat)&&!isNaN(lng))points.push([lat,lng])}}
  if(!points.length)return alert('No valid points');
  fetch('/api/gpx/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,description:desc,points:points})})
  .then(function(r){return r.json()}).then(function(){closeForm();load()});
}
function del(id){if(confirm('Delete?')){fetch('/api/gpx/'+id,{method:'DELETE'}).then(function(){load()})}}
function loadLeaderboard(){
  var lb=document.getElementById('leaderboard');
  if(lb.style.display==='block'){lb.style.display='none';return}
  lb.style.display='block';lb.innerHTML='<p style="color:#a5b4fc;text-align:center">Loading...</p>';
  fetch('/api/gpx/leaderboard').then(function(r){return r.json()}).then(function(board){
    if(!board.length){lb.innerHTML='<p style="color:#52525b;text-align:center;padding:20px">No completions yet</p>';return}
    var h='<h2 style="font-size:16px;margin-bottom:12px">🏆 Route Leaderboard</h2>';
    for(var i=0;i<board.length;i++){
      var b=board[i];h+='<div class="card"><h3>'+esc(b.trackName)+'</h3>';
      for(var j=0;j<b.finishers.length;j++){
        var f=b.finishers[j];var mins=Math.floor(f.time/60000);var secs=Math.floor((f.time%60000)/1000);
        h+='<div style="padding:4px 0;font-size:12px;color:'+(j===0?'#22c55e':'#a1a1aa')+'">#'+(j+1)+' '+esc(f.username)+' — '+mins+'m '+secs+'s</div>';
      }
      h+='</div>';
    }
    lb.innerHTML=h;
  });
}
window.addEventListener('load',load);
</script></body></html>
