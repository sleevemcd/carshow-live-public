<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarShow — Live Event Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5}
input,button,textarea,select{font-family:inherit}
button{cursor:pointer;border:none}
input,textarea{outline:none}
#loginScreen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:#09090b;padding:16px}
.login-card{width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:28px;font-weight:700;margin-bottom:4px}
.login-card .subtitle{color:#71717a;font-size:14px;margin-bottom:24px}
.login-card input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #27272a;background:#18181b;color:#f4f4f5;font-size:15px;margin-bottom:10px}
.login-card button{width:100%;padding:12px;border-radius:12px;font-size:15px;font-weight:600;transition:all .2s}
.btn-primary{background:#4f46e5;color:#fff}
.btn-primary:hover{background:#6366f1}
.btn-outline{background:transparent;border:1px solid #27272a;color:#d4d4d8}
.btn-outline:hover{border-color:#6366f1;color:#6366f1}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.login-card .error{color:#f87171;font-size:13px;margin-top:8px;min-height:20px}
.demo-section{margin-top:20px;padding:16px;border-radius:12px;border:1px solid #312e81;background:rgba(79,70,229,0.1)}
.demo-section p{font-size:12px;color:#a5b4fc;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.demo-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.code-section{margin-top:12px;padding:16px;border-radius:12px;border:1px solid #27272a;background:#18181b}
.code-section p{font-size:12px;color:#71717a;margin-bottom:8px}
.code-row{display:flex;gap:8px}
.code-row input{flex:1;margin-bottom:0;text-transform:uppercase}
.code-hint{font-size:11px;color:#52525b;margin-top:6px}
#app{position:fixed;inset:0}
#map{position:absolute;inset:0;z-index:1}
.leaflet-container{background:#18181b}
#header{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 16px;background:linear-gradient(180deg,rgba(9,9,11,0.95),transparent);display:flex;align-items:center;justify-content:space-between}
#header h1{font-size:16px;font-weight:600}
#header .event-loc{font-size:12px;color:#71717a}
#controls{position:absolute;top:80px;right:12px;z-index:10;display:flex;flex-direction:column;gap:6px}
#controls button{padding:8px 14px;border-radius:10px;background:#18181b;border:1px solid #27272a;color:#d4d4d8;display:flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap}
#controls button.active{background:#4f46e5;border-color:#6366f1;color:#fff}
#vendorPopup{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);z-index:20;width:300px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:none}
#vendorPopup h3{font-size:15px;font-weight:600;margin-bottom:4px}
#vendorPopup .desc{font-size:13px;color:#a1a1aa;margin-bottom:10px}
#vendorPopup .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
#vendorPopup .tag{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(79,70,229,0.2);color:#a5b4fc;border:1px solid #312e81}
#vendorPopup .close{width:100%;margin-top:4px}
#shareBar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:10px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:10px 16px}
#shareBar button{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;background:#4f46e5;color:#fff;white-space:nowrap}
#shareBar .switch-row{display:flex;align-items:center;gap:6px}
#shareBar .switch-row span{font-size:12px;color:#a1a1aa;white-space:nowrap}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{width:100%;max-width:380px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px}
.modal h2{font-size:18px;font-weight:600;margin-bottom:16px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #27272a;background:#09090b;color:#f4f4f5;font-size:14px;margin-bottom:10px}
.modal textarea{resize:vertical;min-height:60px}
.modal label{display:block;font-size:12px;color:#71717a;margin-bottom:4px}
.modal .btn-row{display:flex;gap:8px;margin-top:12px}
.modal .btn-row button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600}
#adminPanel{position:absolute;top:0;right:0;bottom:0;width:320px;z-index:30;background:#18181b;border-left:1px solid #27272a;overflow-y:auto;display:none}
#adminPanel .panel-header{padding:16px;border-bottom:1px solid #27272a;display:flex;justify-content:space-between;align-items:center}
#adminPanel .panel-header h2{font-size:16px}
#adminPanel .event-item{padding:12px 16px;border-bottom:1px solid #1f1f23}
#adminPanel .event-item:hover{background:#1f1f23}
#adminPanel .event-item h3{font-size:14px;font-weight:600}
#adminPanel .event-item .meta{font-size:12px;color:#71717a}
#adminPanel .event-item .actions{margin-top:6px;display:flex;gap:6px}
#adminPanel .event-item .actions button{padding:4px 10px;border-radius:6px;font-size:11px}
#adminPanel .new-btn{margin:12px 16px;width:calc(100% - 32px)}
@media(max-width:600px){#shareBar{bottom:16px;padding:8px 12px;gap:6px}#shareBar button{font-size:12px;padding:6px 10px}#controls{top:70px;right:8px}#controls button{font-size:11px;padding:6px 10px}#adminPanel{width:100%}}
</style>
</head>
<body>

<div id="loginScreen">
<div class="login-card">
<h1>CarShow</h1>
<p class="subtitle">Live Event Map</p>
<input type="text" id="loginInput" placeholder="Enter a username (or leave blank for demo)" maxlength="20" autocomplete="off" />
<button id="loginBtn" class="btn-primary">Join as Attendee</button>
<div id="loginError" class="error"></div>
<div class="demo-section">
<p>Demo — Quick Sign In</p>
<div class="demo-roles">
<button class="btn-outline btn-sm login-admin">Admin</button>
<button class="btn-outline btn-sm login-organizer">Organizer</button>
<button class="btn-outline btn-sm login-vendor">Vendor</button>
<button class="btn-outline btn-sm login-attendee">Attendee</button>
</div>
</div>
<div class="code-section">
<p>Have an event code?</p>
<div class="code-row">
<input type="text" id="codeInput" placeholder="e.g. WEF2026" maxlength="10" autocomplete="off" />
<button class="btn-outline btn-sm" onclick="handleCodeLogin()">Go</button>
</div>
<div class="code-hint" id="codeSection">Codes: WEF2026, CRUISE, MEET</div>
</div>
</div>
</div>

<div id="app" style="display:none">
<div id="map"></div>
<div id="header">
<div style="display:flex;align-items:center;gap:10px">
<button id="backBtn" style="background:none;border:none;color:#a1a1aa;font-size:18px;cursor:pointer;padding:0">←</button>
<div><h1 id="eventId">Loading...</h1><div class="event-loc" id="eventLoc"></div></div>
</div>
<button id="adminPanelBtn" class="btn-outline btn-sm" style="display:none">☰ Admin</button>
</div>
<div id="controls">
<button id="nearbyBtn" title="Show/hide people nearby">👥 People</button>
<button id="locateBtn" title="Jump to my location">◎ My Location</button>
</div>
<div id="vendorPopup">
<h3 id="vpName"></h3><div class="desc" id="vpDesc"></div>
<div class="tags" id="vpTags"></div>
<button class="btn-outline btn-sm close" id="closeVendorPopup">Close</button>
</div>
<div id="shareBar">
<button id="shareBtn">📍 Drop Pin</button>
<div class="switch-row"><input type="checkbox" id="locationToggle" checked /><span>Share location</span></div>
</div>
</div>

<div id="adminPanel">
<div class="panel-header"><h2>Admin Dashboard</h2><button id="closeAdmin" class="btn-outline btn-sm">✕</button></div>
<div style="padding:12px 16px;display:flex;gap:8px">
<button class="btn-primary btn-sm" id="newEventBtn" style="flex:1">+ New Event</button>
<button class="btn-outline btn-sm" id="addVendorAdminBtn" style="flex:1">+ Add Vendor</button>
</div>
<div style="padding:0 16px 12px;font-size:12px;color:#71717a">
<span id="adminEventCount"></span> events · <a href="#" onclick="event.preventDefault();loadAdminPanel()" style="color:#a5b4fc">refresh</a>
</div>
<div id="eventList"></div>
</div>

<div class="modal-overlay" id="spotModal" style="display:none">
<div class="modal">
<h2>Drop a Pin</h2>
<label>Type</label><select id="spotType"><option value="spot">📍 Spot (24hr)</option><option value="car_spot">🚗 Car Spot (30min)</option></select>
<label>Label</label><input type="text" id="spotLabel" placeholder="e.g. Best photo spot" maxlength="80" />
<label>Description</label><textarea id="spotDesc" placeholder="Add some details..." maxlength="200"></textarea>
<div class="btn-row"><button id="cancelSpotBtn" class="btn-outline">Cancel</button><button id="saveSpotBtn" class="btn-primary">Drop Pin</button></div>
</div>
</div>

<div class="modal-overlay" id="vendorModal" style="display:none">
<div class="modal">
<h2>Add Vendor</h2>
<label>Business Name</label><input type="text" id="vendorName" placeholder="e.g. Prestige Wheels" />
<label>Description</label><textarea id="vendorDesc" placeholder="What they offer..."></textarea>
<label>Lat / Lng</label>
<div style="display:flex;gap:8px"><input type="number" id="vendorLat" step="any" placeholder="Lat" /><input type="number" id="vendorLng" step="any" placeholder="Lng" /></div>
<div class="btn-row"><button id="cancelVendorBtn" class="btn-outline">Cancel</button><button id="saveVendorBtn" class="btn-primary">Add Vendor</button></div>
</div>
</div>

<div class="modal-overlay" id="eventModal" style="display:none">
<div class="modal">
<h2 id="eventTitle">New Event</h2>
<label>Name</label><input type="text" id="evName" placeholder="e.g. Wasatch Euro Fest" />
<label>Description</label><textarea id="evDesc" placeholder="Event description..."></textarea>
<label>Location Name</label><input type="text" id="evLoc" placeholder="City, State" />
<div style="display:flex;gap:8px"><div style="flex:1"><label>Lat</label><input type="number" id="evLat" step="any" placeholder="40.5144" /></div><div style="flex:1"><label>Lng</label><input type="number" id="evLng" step="any" placeholder="-111.4764" /></div></div>
<div style="display:flex;gap:8px"><div style="flex:1"><label>Radius (m)</label><input type="number" id="evRadius" value="2000" /></div><div style="flex:1"><label>Access Code</label><input type="text" id="evCode" placeholder="e.g. WEF2027" /></div></div>
<label style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><input type="checkbox" id="evActive" checked /> Active</label>
<div class="btn-row"><button id="cancelEventBtn" class="btn-outline">Cancel</button><button id="saveEventBtn" class="btn-primary">Save</button></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── App JS ──────────────────────────────────────────────────────────
let map, currentUser=null, currentEvent=null;
let userMarkers={}, vendorMarkers={}, spotMarkers={}, pollingTimers=[];
let showingNearby=false, locationWatchId=null;

const $=s=>document.querySelector(s), show=el=>el.style.display='block', hide=el=>el.style.display='none';
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

function handleLogin(role){
  let username=$('#loginInput').value.trim();
  if(!username||username.length<2) username=role+'_'+Math.random().toString(36).slice(2,8);
  $('#loginError').textContent='';
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,role,event_id:currentEvent?.id||'demo-event-1'})})
  .then(r=>r.json()).then(data=>{
    if(data.error){$('#loginError').textContent=data.error;return}
    currentUser={username:data.username,role:data.role,event_id:data.event.id};
    currentEvent=data.event;
    hide($('#loginScreen'));show($('#app'));
    initMap();
  }).catch(()=>{$('#loginError').textContent='Login failed'});
}

function handleCodeLogin(){
  const code=$('#codeInput').value.trim().toUpperCase();
  $('#loginError').textContent='';
  if(!code){$('#loginError').textContent='Enter a code';return}
  fetch('/api/events/code/'+code).then(r=>r.json()).then(e=>{
    if(e.error){$('#loginError').textContent=e.error;return}
    currentEvent=e;$('#codeSection').innerHTML='<p style="color:#22c55e;font-size:13px">✓ '+esc(e.name)+'</p>';
  }).catch(()=>{$('#loginError').textContent='Invalid code'});
}

function initLogin(){
  $('#loginBtn').addEventListener('click',()=>handleLogin('attendee'));
  $('#loginInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin('attendee')});
  ['admin','organizer','vendor','attendee'].forEach(r=>{$('.login-'+r).addEventListener('click',()=>handleLogin(r))});
}

function showError(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#18181b;border:1px solid #27272a;border-radius:12px;padding:20px;z-index:9999;color:#f4f4f5;text-align:center;font-size:14px;';
  el.innerHTML='<p>'+msg+'</p><button onclick="this.parentElement.remove()" style="margin-top:8px;padding:6px 14px;border-radius:8px;background:#4f46e5;color:#fff;border:none;cursor:pointer">OK</button>';
  document.body.appendChild(el);
}

function initMap(){
  try{
    const ev=currentEvent;
    if(!ev){showError('No event data');return}
    if(typeof L==='undefined'){showError('Map library not loaded. Please refresh.');return}
    $('#eventId').textContent=ev.name;$('#eventLoc').textContent=ev.location_name;
    document.title=ev.name+' — CarShow';
    map=L.map('map',{zoomControl:false,attributionControl:false}).setView([ev.lat,ev.lng],16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
    L.marker([ev.lat,ev.lng],{icon:L.divIcon({className:'',html:'<div style="width:24px;height:24px;border-radius:50%;background:#4f46e5;border:3px solid #818cf8;box-shadow:0 0 16px rgba(99,102,241,0.6)"></div>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map);
    if(ev.radius_meters) L.circle([ev.lat,ev.lng],{radius:ev.radius_meters,color:'#6366f1',fillColor:'#6366f1',fillOpacity:0.05,weight:1}).addTo(map);
    loadVendors();loadSpots();setupLocation();setupPolling();initControls();
  }catch(e){showError('Map error: '+e.message)}
}

function initControls(){
  const role=currentUser?.role;
  $('#backBtn').addEventListener('click',logout);
  if(role==='admin'){
    
    show($('#adminPanelBtn'));
    $('#adminPanelBtn').addEventListener('click',toggleAdmin);
    $('#closeAdmin').addEventListener('click',()=>hide($('#adminPanel')));
    $('#newEventBtn').addEventListener('click',openEventModal);
    $('#addVendorAdminBtn').addEventListener('click',openVendorModal);
    loadAdminPanel();
    show($('#adminPanel'));
  }
  
  $('#shareBtn').addEventListener('click',openSpotModal);
  $('#nearbyBtn').addEventListener('click',toggleNearby);
  $('#locateBtn').addEventListener('click',()=>{if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{var loc={lat:p.coords.latitude,lng:p.coords.longitude};updateMyMarker(loc);map.setView([loc.lat,loc.lng],16)},()=>{showError('Location not available. Check browser permissions.')},{enableHighAccuracy:true,timeout:10000});else showError('Geolocation not supported')});
  $('#locationToggle').addEventListener('change',e=>{fetch('/api/location/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentUser.username})})});
  $('#closeVendorPopup').addEventListener('click',()=>hide($('#vendorPopup')));
  $('#saveSpotBtn').addEventListener('click',saveSpot);
  $('#cancelSpotBtn').addEventListener('click',()=>hide($('#spotModal')));
  $('#saveVendorBtn').addEventListener('click',saveVendor);
  $('#cancelVendorBtn').addEventListener('click',()=>hide($('#vendorModal')));
  $('#saveEventBtn').addEventListener('click',saveEvent);
  $('#cancelEventBtn').addEventListener('click',()=>hide($('#eventModal')));
}

function loadVendors(){fetch('/api/vendors/'+currentEvent.id).then(r=>r.json()).then(list=>{Object.values(vendorMarkers).forEach(m=>map.removeLayer(m));vendorMarkers={};list.forEach(addVendorMarker)})}
function addVendorMarker(v){if(!v.is_active)return;const icon=L.divIcon({className:'',html:'<div style="width:36px;height:36px;border-radius:50%;background:#f59e0b;border:2px solid #fbbf24;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 12px rgba(245,158,11,0.4)">🏪</div>',iconSize:[36,36],iconAnchor:[18,18]});const m=L.marker([v.lat,v.lng],{icon}).addTo(map).bindPopup('<b>'+esc(v.business_name)+'</b><br>'+esc(v.description)+(v.tags?.length?'<br><small>'+v.tags.map(t=>'#'+t).join(' ')+'</small>':''));m.on('click',()=>{$('#vpName').textContent=v.business_name;$('#vpDesc').textContent=v.description;$('#vpTags').innerHTML=(v.tags||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('');show($('#vendorPopup'))});vendorMarkers[v.id]=m}
function loadSpots(){fetch('/api/spots/'+currentEvent.id).then(r=>r.json()).then(list=>{Object.values(spotMarkers).forEach(m=>map.removeLayer(m));spotMarkers={};list.forEach(addSpotMarker)})}
function addSpotMarker(s){const isCar=s.spot_type==='car_spot';const icon=L.divIcon({className:'',html:'<div style="width:28px;height:28px;border-radius:50%;background:'+(isCar?'#f59e0b':'#22c55e')+';border:2px solid '+(isCar?'#fbbf24':'#4ade80')+';display:flex;align-items:center;justify-content:center;font-size:12px">'+(isCar?'🚗':'📍')+'</div>',iconSize:[28,28],iconAnchor:[14,14]});const m=L.marker([s.lat,s.lng],{icon}).addTo(map).bindPopup('<b>'+esc(s.label)+'</b>'+(s.description?'<br>'+esc(s.description):'')+'<br><small>by '+esc(s.username)+' · ❤️ '+(s.likes||0)+'</small>');m.on('click',()=>{fetch('/api/spots/'+s.id+'/like',{method:'POST'}).then(r=>r.json()).then(d=>{if(spotMarkers[s.id])s.likes=d.likes;m.setPopupContent('<b>'+esc(s.label)+'</b>'+(s.description?'<br>'+esc(s.description):'')+'<br><small>by '+esc(s.username)+' · ❤️ '+d.likes+'</small>')})});spotMarkers[s.id]=m}
function setupLocation(){if(!navigator.geolocation)return;locationWatchId=navigator.geolocation.watchPosition(p=>{const loc={lat:p.coords.latitude,lng:p.coords.longitude};fetch('/api/location',{method:'POST', headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentUser.username,...loc,event_id:currentEvent.id})});updateMyMarker(loc)},()=>{},{enableHighAccuracy:true,maximumAge:10000})}
function updateMyMarker(loc){
  const isFirst = !userMarkers._me;
  if(userMarkers._me)map.removeLayer(userMarkers._me);
  const icon=L.divIcon({className:'',html:'<div style="width:22px;height:22px;border-radius:50%;background:#6366f1;border:3px solid #fff;box-shadow:0 0 12px rgba(99,102,241,0.8);position:relative"><div style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#a5b4fc;white-space:nowrap;font-weight:600">YOU</div></div>',iconSize:[22,22],iconAnchor:[11,11]});
  userMarkers._me=L.marker([loc.lat,loc.lng],{icon,zIndexOffset:1000}).addTo(map);
  if(isFirst) map.setView([loc.lat,loc.lng],14);
}
function setupPolling(){pollingTimers.push(setInterval(pollUsers,3000));pollingTimers.push(setInterval(pollVendors,5000));pollingTimers.push(setInterval(pollSpots,5000))}
function pollUsers(){if(!currentEvent||!showingNearby)return;fetch('/api/users/'+currentEvent.id).then(r=>r.json()).then(list=>{const ids=new Set(list.map(u=>u.username));Object.keys(userMarkers).forEach(k=>{if(k!=='_me'&&!ids.has(k)){map.removeLayer(userMarkers[k]);delete userMarkers[k]}});list.forEach(u=>{if(u.username===currentUser.username)return;const colors={admin:'#dc2626',organizer:'#f59e0b',vendor:'#22c55e',attendee:'#6366f1'};const c=colors[u.role]||'#6366f1';const icon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;border-radius:50%;background:'+c+';border:2px solid #fff;box-shadow:0 0 6px '+c+';position:relative"><div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;color:#a1a1aa;white-space:nowrap">'+esc(u.username)+'</div></div>',iconSize:[14,14],iconAnchor:[7,7]});if(userMarkers[u.username]){userMarkers[u.username].setLatLng([u.lat,u.lng])}else if(u.lat&&u.lng){userMarkers[u.username]=L.marker([u.lat,u.lng],{icon,zIndexOffset:100}).addTo(map)}})})}
function pollVendors(){if(!currentEvent)return;fetch('/api/vendors/'+currentEvent.id).then(r=>r.json()).then(list=>{const ids=new Set(list.filter(v=>v.is_active).map(v=>v.id));Object.keys(vendorMarkers).forEach(id=>{if(!ids.has(id)){map.removeLayer(vendorMarkers[id]);delete vendorMarkers[id]}});list.filter(v=>v.is_active).forEach(v=>{if(vendorMarkers[v.id]){const m=vendorMarkers[v.id];if(m.getLatLng().lat!==v.lat||m.getLatLng().lng!==v.lng)m.setLatLng([v.lat,v.lng])}else addVendorMarker(v)})})}
function pollSpots(){if(!currentEvent)return;fetch('/api/spots/'+currentEvent.id).then(r=>r.json()).then(list=>{const ids=new Set(list.map(s=>s.id));Object.keys(spotMarkers).forEach(id=>{if(!ids.has(id)){map.removeLayer(spotMarkers[id]);delete spotMarkers[id]}});list.forEach(s=>{if(spotMarkers[s.id]){const m=spotMarkers[s.id];if(m.getLatLng().lat!==s.lat||m.getLatLng().lng!==s.lng)m.setLatLng([s.lat,s.lng])}else addSpotMarker(s)})})}
function toggleNearby(){showingNearby=!showingNearby;$('#nearbyBtn').classList.toggle('active',showingNearby);if(!showingNearby){Object.entries(userMarkers).forEach(([k,m])=>{if(k!=='_me'){map.removeLayer(m);delete userMarkers[k]}})}else pollUsers()}
function openSpotModal(){show($('#spotModal'));$('#spotLabel').value='';$('#spotDesc').value=''}
function saveSpot(){const label=$('#spotLabel').value.trim();if(!label)return;const c=map.getCenter();fetch('/api/spots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:currentEvent.id,label,description:$('#spotDesc').value.trim(),lat:c.lat,lng:c.lng,spot_type:$('#spotType').value,username:currentUser?.username||'anon'})});hide($('#spotModal'))}
function openVendorModal(){show($('#vendorModal'));$('#vendorName').value='';$('#vendorDesc').value='';$('#vendorLat').value='';$('#vendorLng').value=''}
function saveVendor(){const name=$('#vendorName').value.trim();if(!name)return;const c=map.getCenter();fetch('/api/vendors',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:currentEvent.id,business_name:name,description:$('#vendorDesc').value.trim(),lat:parseFloat($('#vendorLat').value)||c.lat,lng:parseFloat($('#vendorLng').value)||c.lng,tags:[],user_id:currentUser?.username||'anon'})}).then(()=>pollVendors());hide($('#vendorModal'))}
function openEventModal(ev){show($('#eventModal'));$('#eventTitle').textContent=ev?'Edit Event':'New Event';$('#evName').value=ev?ev.name:'';$('#evDesc').value=ev?ev.description:'';$('#evLoc').value=ev?ev.location_name:'';$('#evLat').value=ev?ev.lat:'';$('#evLng').value=ev?ev.lng:'';$('#evCode').value=ev?ev.access_code:'';$('#evRadius').value=ev?ev.radius_meters:2000;$('#evActive').checked=ev?ev.is_active:true;$('#saveEventBtn').dataset.editId=ev?ev.id:''}
function saveEvent(){const data={name:$('#evName').value.trim(),description:$('#evDesc').value.trim(),location_name:$('#evLoc').value.trim(),lat:parseFloat($('#evLat').value)||40.5144,lng:parseFloat($('#evLng').value)||-111.4764,radius_meters:parseInt($('#evRadius').value)||2000,access_code:$('#evCode').value.trim()||undefined,is_active:$('#evActive').checked};if(!data.name)return;const eid=$('#saveEventBtn').dataset.editId;const m=eid?'PUT':'POST';const u=eid?'/api/events/'+eid:'/api/events';fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(()=>{hide($('#eventModal'));loadAdminPanel()})}
function loadAdminPanel(){fetch('/api/events').then(r=>r.json()).then(list=>{$('#adminEventCount').textContent=list.length;$('#eventList').innerHTML=list.map(e=>'<div class="event-item"><h3>'+esc(e.name)+(e.is_active?'':' <span style="color:#f87171;font-size:11px">(inactive)</span>')+'</h3><div class="meta">'+esc(e.location_name)+' · code: '+esc(e.access_code||'')+(e.child_count?' · '+e.child_count+' sub-events':'')+'</div><div class="actions"><button class="btn-outline btn-sm" onclick="openEventModalById(\''+e.id+'\')">Edit</button><button class="btn-danger btn-sm" onclick="deleteEventById(\''+e.id+'\')">Delete</button><button class="btn-outline btn-sm" onclick="switchToEvent(\''+e.id+'\')">View</button></div></div>').join('')||'<p style="padding:16px;color:#71717a">No events</p>'})}
window.openEventModalById=id=>fetch('/api/events/'+id).then(r=>r.json()).then(e=>openEventModal(e));
window.deleteEventById=id=>{if(confirm('Delete?'))fetch('/api/events/'+id,{method:'DELETE'}).then(()=>loadAdminPanel())};
window.switchToEvent=id=>fetch('/api/events/'+id).then(r=>r.json()).then(e=>{currentEvent=e;$('#eventId').textContent=e.name;$('#eventLoc').textContent=e.location_name;map.setView([e.lat,e.lng],16);loadVendors();loadSpots();hide($('#adminPanel'))});
function toggleAdmin(){const p=$('#adminPanel');p.style.display=p.style.display==='none'?'':'none';loadAdminPanel()}
function logout(){
  if(currentUser)fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentUser.username})});
  pollingTimers.forEach(clearInterval);
  if(locationWatchId)navigator.geolocation.clearWatch(locationWatchId);
  if(map){Object.values(userMarkers).forEach(m=>map.removeLayer(m));Object.values(vendorMarkers).forEach(m=>map.removeLayer(m));Object.values(spotMarkers).forEach(m=>map.removeLayer(m));map.remove()}
  userMarkers={};vendorMarkers={};spotMarkers={};pollingTimers=[];showingNearby=false;
  currentUser=null;currentEvent=null;map=null;
  hide($('#app'));show($('#loginScreen'));
}
window.addEventListener('beforeunload',()=>{if(currentUser)navigator.sendBeacon('/api/logout',JSON.stringify({username:currentUser.username}));pollingTimers.forEach(clearInterval)});
window.addEventListener('load',initLogin);
</script>
</body>
