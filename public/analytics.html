<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Analytics</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:#f4f4f5;padding:20px;max-width:600px;margin:0 auto}h1{font-size:20px;margin-bottom:20px}h2{font-size:14px;color:#71717a;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px}.stat{font-size:36px;font-weight:700;color:#a5b4fc}.label{font-size:12px;color:#71717a}.card{padding:16px;border:1px solid #27272a;border-radius:12px;background:#18181b;margin-bottom:12px}.row{display:flex;gap:12px;margin-bottom:12px}.row>*{flex:1}.item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f1f23;font-size:13px}.item span:last-child{color:#a5b4fc;font-weight:600}button{font-family:inherit;cursor:pointer;border:none;padding:6px 12px;border-radius:8px;font-size:12px}.btn-outline{background:transparent;border:1px solid #27272a;color:#d4d4d8}</style></head><body>
<h1>📊 Analytics</h1>
<div class="toolbar"><button class="btn-outline" onclick="history.back()">← Back</button></div>
<div class="row"><div class="card" style="text-align:center"><div class="stat" id="totalUsers">-</div><div class="label">Total Users</div></div><div class="card" style="text-align:center"><div class="stat" id="activeSessions">-</div><div class="label">Active Sessions</div></div></div>
<div class="row"><div class="card" style="text-align:center"><div class="stat" id="totalSpots">-</div><div class="label">Pins Dropped</div></div><div class="card" style="text-align:center"><div class="stat" id="totalLikes">-</div><div class="label">Total Likes</div></div></div>
<div class="card"><h2>Top Spots</h2><div id="topSpots"></div></div>
<div class="card"><h2>Poker Stats</h2><div class="row"><div style="text-align:center"><div class="stat" id="pokerPlayers">-</div><div class="label">Players</div></div><div style="text-align:center"><div class="stat" id="pokerCards">-</div><div class="label">Cards Dealt</div></div></div></div>
<script>
function fetchAll(){
  fetch('/api/dummy-users').then(r=>r.json()).then(function(u){document.getElementById('totalUsers').textContent=u.length});
  fetch('/api/events').then(r=>r.json()).then(function(evs){
    var ps=[],likes=0;
    Promise.all(evs.map(function(e){return fetch('/api/spots/'+e.id).then(r=>r.json())})).then(function(results){
      results.forEach(function(s){s.forEach(function(x){ps.push(x);likes+=x.likes||0})});
      document.getElementById('totalSpots').textContent=ps.length;
      document.getElementById('totalLikes').textContent=likes;
      var top=ps.sort(function(a,b){return(b.likes||0)-(a.likes||0)}).slice(0,5);
      var h='';for(var i=0;i<top.length;i++){h+='<div class="item"><span>'+esc(top[i].label||'?')+'</span><span>❤️ '+top[i].likes+'</span></div>'};
      document.getElementById('topSpots').innerHTML=h||'<p style="color:#52525b">No spots yet</p>';
    });
  });
  fetch('/api/poker/leaderboard').then(r=>r.json()).then(function(b){
    document.getElementById('pokerPlayers').textContent=b.length;
    var cards=0;b.forEach(function(x){cards+=x.cards?x.cards.length:0});
    document.getElementById('pokerCards').textContent=cards;
  });
}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
window.addEventListener('load',fetchAll);
</script></body></html>
